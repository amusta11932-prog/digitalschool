<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in / Register — AI Learning Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <a class="auth-back" href="index.html">&larr; Back to home</a>

    <div class="modal auth-card">
        <div class="auth-tabs">
            <button class="tab active" data-tab="login">Log In</button>
            <button class="tab" data-tab="register">Register</button>
        </div>

        <form id="loginForm" class="auth-form active" novalidate>
            <h3>Welcome back</h3>
            <label>Email
                <input type="email" name="email" required placeholder="you@school.com">
            </label>
            <label>Password
                <input type="password" name="password" required minlength="6" placeholder="••••••••">
            </label>
            <button type="submit" class="btn-submit">Log In</button>
            <p class="msg" id="loginMsg"></p>
            <p class="auth-switch">New here? <a href="#" data-goto="register">Create an account</a>.</p>
        </form>

        <form id="registerForm" class="auth-form" novalidate>
            <h3>Create your account</h3>
            <label>Full name
                <input type="text" name="full_name" placeholder="Alex Doe">
            </label>
            <label>Email
                <input type="email" name="email" required placeholder="you@school.com">
            </label>
            <label>Grade (6–12)
                <input type="number" name="grade_level" min="6" max="12" placeholder="9">
            </label>
            <label>Password
                <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
            </label>
            <button type="submit" class="btn-submit">Register</button>
            <p class="msg" id="registerMsg"></p>
            <p class="auth-switch">Already have an account? <a href="#" data-goto="login">Log in</a>.</p>
        </form>
    </div>

    <!-- Supabase client + page logic (defer = run in order after DOM parse) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
    <script defer src="login.js"></script>
</body>
</html>
